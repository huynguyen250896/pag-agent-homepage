<script>
async function loadContent(id, file) {
    const response = await fetch(file);
    const html = await response.text();
    document.getElementById(id).innerHTML = html;
}

loadContent("start", "tutorial/getting_started.html");
loadContent("input", "tutorial/input.html");
loadContent("analysis", "tutorial/analysis.html");
loadContent("citation", "tutorial/citation.html");
loadContent("faq", "tutorial/faq.html");
</script>

<script>
    function openTab(evt, tabId) {
    document.querySelectorAll(".tab-content").forEach(tab => {
        tab.classList.remove("active");
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.remove("active");
    });

    document.getElementById(tabId).classList.add("active");
    evt.currentTarget.classList.add("active");
}
</script>
